<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" preserveAspectRatio="xMidYMid slice">
  <!-- Azure Tower — Gedung Perkantoran Komersial -->
  <defs>
    <linearGradient id="p3-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a93b0"/>
      <stop offset="1" stop-color="#d0dae6"/>
    </linearGradient>
    <linearGradient id="p3-glass" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.4" stop-color="#1e3a5f"/>
      <stop offset="0.7" stop-color="#2980b9" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" fill="url(#p3-sky)"/>

  <!-- Background buildings -->
  <g fill="#475569" opacity="0.35">
    <rect x="0" y="180" width="90" height="270"/>
    <rect x="510" y="150" width="90" height="300"/>
    <rect x="60" y="220" width="50" height="230"/>
  </g>

  <!-- Main glass tower -->
  <rect x="150" y="40" width="300" height="410" fill="url(#p3-glass)"/>

  <!-- Glass curtain wall grid — vertical -->
  <g stroke="#0f172a" stroke-width="1" opacity="0.4">
    <line x1="185" y1="40" x2="185" y2="450"/>
    <line x1="220" y1="40" x2="220" y2="450"/>
    <line x1="255" y1="40" x2="255" y2="450"/>
    <line x1="290" y1="40" x2="290" y2="450"/>
    <line x1="325" y1="40" x2="325" y2="450"/>
    <line x1="360" y1="40" x2="360" y2="450"/>
    <line x1="395" y1="40" x2="395" y2="450"/>
    <line x1="430" y1="40" x2="430" y2="450"/>
  </g>

  <!-- Glass curtain wall grid — horizontal (floor lines) -->
  <g stroke="#0f172a" stroke-width="1.5" opacity="0.4">
    <line x1="150" y1="90" x2="450" y2="90"/>
    <line x1="150" y1="140" x2="450" y2="140"/>
    <line x1="150" y1="190" x2="450" y2="190"/>
    <line x1="150" y1="240" x2="450" y2="240"/>
    <line x1="150" y1="290" x2="450" y2="290"/>
    <line x1="150" y1="340" x2="450" y2="340"/>
    <line x1="150" y1="390" x2="450" y2="390"/>
  </g>

  <!-- Floor reflections / highlights -->
  <g fill="#c8a96a" opacity="0.3">
    <rect x="150" y="40" width="300" height="2"/>
    <rect x="255" y="95" width="120" height="40"/>
    <rect x="185" y="195" width="100" height="40"/>
    <rect x="360" y="245" width="80" height="40"/>
    <rect x="220" y="345" width="110" height="40"/>
  </g>

  <!-- Accent crown / spire -->
  <rect x="150" y="40" width="300" height="6" fill="#c8a96a"/>
  <rect x="292" y="15" width="16" height="25" fill="#c8a96a" opacity="0.5"/>
</svg>
