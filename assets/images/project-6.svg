<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" preserveAspectRatio="xMidYMid slice">
  <!-- Metro Commercial — Ruko modern -->
  <defs>
    <linearGradient id="p6-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#95aec9"/>
      <stop offset="1" stop-color="#e2ebf5"/>
    </linearGradient>
    <linearGradient id="p6-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="p6-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" fill="url(#p6-sky)"/>

  <!-- Street level -->
  <rect x="0" y="370" width="600" height="80" fill="#3a4756"/>
  <rect x="0" y="365" width="600" height="8" fill="#94a3b8" opacity="0.4"/>

  <!-- Sidewalk -->
  <rect x="0" y="410" width="600" height="20" fill="#cbd5e1"/>

  <!-- Unit 1 — dark facade -->
  <rect x="30" y="100" width="170" height="265" fill="url(#p6-dark)"/>
  <rect x="25" y="90" width="180" height="14" fill="#0f172a"/>
  <rect x="25" y="90" width="180" height="3" fill="#c8a96a" opacity="0.6"/>

  <!-- Showroom glass -->
  <rect x="45" y="130" width="140" height="100" fill="url(#p6-light)" opacity="0.15"/>
  <rect x="45" y="130" width="140" height="100" fill="#c8a96a" opacity="0.08"/>
  <g stroke="#475569" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="115" y1="130" x2="115" y2="230"/>
    <line x1="45" y1="180" x2="185" y2="180"/>
  </g>

  <!-- Upper windows -->
  <g fill="#c8a96a" opacity="0.35">
    <rect x="55" y="245" width="50" height="40"/>
    <rect x="125" y="245" width="50" height="40"/>
  </g>
  <rect x="75" y="300" width="80" height="70" fill="#475569"/>

  <!-- Unit 2 — light facade -->
  <rect x="210" y="100" width="180" height="265" fill="url(#p6-light)"/>
  <rect x="210" y="100" width="180" height="265" fill="#c8a96a" opacity="0.04"/>
  <rect x="205" y="90" width="190" height="14" fill="#1e293b"/>
  <rect x="205" y="90" width="190" height="3" fill="#c8a96a" opacity="0.6"/>

  <rect x="225" y="130" width="150" height="100" fill="url(#p6-dark)" opacity="0.85"/>
  <rect x="225" y="130" width="150" height="100" fill="#c8a96a" opacity="0.1"/>
  <g stroke="#475569" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="300" y1="130" x2="300" y2="230"/>
    <line x1="225" y1="180" x2="375" y2="180"/>
  </g>

  <g fill="#c8a96a" opacity="0.45">
    <rect x="235" y="245" width="55" height="40"/>
    <rect x="310" y="245" width="55" height="40"/>
  </g>
  <rect x="255" y="300" width="90" height="70" fill="#94a3b8" opacity="0.6"/>

  <!-- Unit 3 — dark facade -->
  <rect x="400" y="100" width="170" height="265" fill="url(#p6-dark)"/>
  <rect x="395" y="90" width="180" height="14" fill="#0f172a"/>
  <rect x="395" y="90" width="180" height="3" fill="#c8a96a" opacity="0.6"/>

  <rect x="415" y="130" width="140" height="100" fill="url(#p6-light)" opacity="0.15"/>
  <rect x="415" y="130" width="140" height="100" fill="#c8a96a" opacity="0.08"/>
  <g stroke="#475569" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="485" y1="130" x2="485" y2="230"/>
    <line x1="415" y1="180" x2="555" y2="180"/>
  </g>

  <g fill="#c8a96a" opacity="0.35">
    <rect x="425" y="245" width="50" height="40"/>
    <rect x="495" y="245" width="50" height="40"/>
  </g>
  <rect x="445" y="300" width="80" height="70" fill="#475569"/>
</svg>
