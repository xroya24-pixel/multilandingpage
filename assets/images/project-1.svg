<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" preserveAspectRatio="xMidYMid slice">
  <!-- Skyline Residence — Apartemen -->
  <defs>
    <linearGradient id="p1-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8b8cc"/>
      <stop offset="1" stop-color="#e0e8f0"/>
    </linearGradient>
    <linearGradient id="p1-tower" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="0.5" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" fill="url(#p1-sky)"/>

  <!-- Background buildings -->
  <g fill="#64748b" opacity="0.4">
    <rect x="0" y="200" width="100" height="250"/>
    <rect x="490" y="180" width="110" height="270"/>
    <rect x="80" y="160" width="60" height="290"/>
  </g>

  <!-- Main apartment tower -->
  <rect x="150" y="60" width="300" height="390" fill="url(#p1-tower)"/>

  <!-- Balcony grid -->
  <g stroke="#475569" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="150" y1="120" x2="450" y2="120"/>
    <line x1="150" y1="180" x2="450" y2="180"/>
    <line x1="150" y1="240" x2="450" y2="240"/>
    <line x1="150" y1="300" x2="450" y2="300"/>
    <line x1="150" y1="360" x2="450" y2="360"/>
    <line x1="225" y1="60" x2="225" y2="450"/>
    <line x1="300" y1="60" x2="300" y2="450"/>
    <line x1="375" y1="60" x2="375" y2="450"/>
  </g>

  <!-- Lit windows -->
  <g fill="#c8a96a" opacity="0.55">
    <rect x="165" y="130" width="50" height="40"/>
    <rect x="240" y="130" width="50" height="40"/>
    <rect x="390" y="130" width="50" height="40"/>
    <rect x="165" y="190" width="50" height="40"/>
    <rect x="315" y="190" width="50" height="40"/>
    <rect x="390" y="190" width="50" height="40"/>
    <rect x="240" y="250" width="50" height="40"/>
    <rect x="315" y="250" width="50" height="40"/>
    <rect x="165" y="310" width="50" height="40"/>
    <rect x="315" y="310" width="50" height="40"/>
    <rect x="390" y="310" width="50" height="40"/>
    <rect x="240" y="370" width="50" height="40"/>
    <rect x="390" y="370" width="50" height="40"/>
  </g>

  <!-- Accent crown -->
  <rect x="150" y="60" width="300" height="8" fill="#c8a96a"/>
  <rect x="290" y="30" width="20" height="30" fill="#c8a96a" opacity="0.6"/>
</svg>
