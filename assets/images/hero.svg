<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <!-- Ganti file ini dengan foto properti modern (.jpg/.webp) -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8499b0"/>
      <stop offset="0.6" stop-color="#c4b59a"/>
      <stop offset="1" stop-color="#e8dcc4"/>
    </linearGradient>
    <linearGradient id="bldgFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a6b85"/>
      <stop offset="1" stop-color="#3d4a60"/>
    </linearGradient>
    <linearGradient id="bldgMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e3a4f"/>
      <stop offset="1" stop-color="#1a2333"/>
    </linearGradient>
    <linearGradient id="bldgNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Sun glow -->
