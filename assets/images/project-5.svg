<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" preserveAspectRatio="xMidYMid slice">
  <!-- The Grand Boutique — Hotel butik mewah -->
  <defs>
    <linearGradient id="p5-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a6c80"/>
      <stop offset="0.6" stop-color="#9aabc0"/>
      <stop offset="1" stop-color="#d8c8a8"/>
    </linearGradient>
    <linearGradient id="p5-bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3340"/>
      <stop offset="1" stop-color="#141a22"/>
    </linearGradient>
    <linearGradient id="p5-entrance" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4b87a"/>
      <stop offset="1" stop-color="#9a7e44"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" fill="url(#p5-sky)"/>

  <!-- Moon / sun -->
  <circle cx="480" cy="100" r="45" fill="#f0e4c8" opacity="0.4"/>

  <!-- Background buildings -->
  <g fill="#3a4658" opacity="0.3">
    <rect x="0" y="200" width="80" height="250"/>
    <rect x="520" y="160" width="80" height="290"/>
  </g>

  <!-- Main hotel building -->
  <rect x="100" y="80" width="400" height="370" fill="url(#p5-bldg)"/>

  <!-- Window rows — grid -->
  <g fill="#c8a96a" opacity="0.4">
    <!-- Row 1 -->
    <rect x="130" y="120" width="40" height="30"/><rect x="190" y="120" width="40" height="30"/>
    <rect x="250" y="120" width="40" height="30"/><rect x="370" y="120" width="40" height="30"/>
    <rect x="430" y="120" width="40" height="30"/>
    <!-- Row 2 -->
    <rect x="130" y="175" width="40" height="30"/><rect x="250" y="175" width="40" height="30"/>
    <rect x="310" y="175" width="40" height="30"/><rect x="430" y="175" width="40" height="30"/>
    <!-- Row 3 -->
    <rect x="190" y="230" width="40" height="30"/><rect x="310" y="230" width="40" height="30"/>
    <rect x="370" y="230" width="40" height="30"/><rect x="430" y="230" width="40" height="30"/>
    <!-- Row 4 -->
    <rect x="130" y="285" width="40" height="30"/><rect x="250" y="285" width="40" height="30"/>
    <rect x="370" y="285" width="40" height="30"/>
  </g>

  <!-- Grand entrance canopy -->
  <rect x="200" y="330" width="200" height="20" fill="url(#p5-entrance)"/>
  <rect x="230" y="350" width="140" height="100" fill="url(#p5-entrance)" opacity="0.8"/>

  <!-- Warm entrance glow -->
  <rect x="240" y="355" width="120" height="95" fill="#c8a96a" opacity="0.3"/>

  <!-- Columns -->
  <rect x="220" y="350" width="12" height="100" fill="#1e293b" opacity="0.6"/>
  <rect x="368" y="350" width="12" height="100" fill="#1e293b" opacity="0.6"/>

  <!-- Accent top band -->
  <rect x="100" y="80" width="400" height="6" fill="#c8a96a"/>
  <!-- Hotel name plate -->
  <rect x="260" y="95" width="80" height="16" fill="#c8a96a" opacity="0.5"/>
</svg>
