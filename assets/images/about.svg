<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 720" width="640" height="720" preserveAspectRatio="xMidYMid slice">
  <!-- Ganti file ini dengan foto gedung modern (.jpg/.webp) -->
  <defs>
    <linearGradient id="ab-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8c5d6"/>
      <stop offset="1" stop-color="#e8edf3"/>
    </linearGradient>
    <linearGradient id="ab-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="0.5" stop-color="#334155"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="640" height="720" fill="url(#ab-sky)"/>

  <!-- Background buildings -->
  <g fill="#94a3b8" opacity="0.5">
    <rect x="0" y="280" width="120" height="440"/>
    <rect x="520" y="320" width="120" height="400"/>
  </g>

  <!-- Main building -->
  <rect x="120" y="80" width="400" height="640" fill="url(#ab-glass)"/>

  <!-- Glass facade grid -->
  <g stroke="#475569" stroke-width="1.5" opacity="0.6" fill="none">
    <line x1="120" y1="160" x2="520" y2="160"/>
    <line x1="120" y1="240" x2="520" y2="240"/>
    <line x1="120" y1="320" x2="520" y2="320"/>
    <line x1="120" y1="400" x2="520" y2="400"/>
    <line x1="120" y1="480" x2="520" y2="480"/>
    <line x1="120" y1="560" x2="520" y2="560"/>
    <line x1="120" y1="640" x2="520" y2="640"/>
    <line x1="200" y1="80" x2="200" y2="720"/>
    <line x1="280" y1="80" x2="280" y2="720"/>
    <line x1="360" y1="80" x2="360" y2="720"/>
    <line x1="440" y1="80" x2="440" y2="720"/>
  </g>

  <!-- Lit windows -->
  <g fill="#c8a96a" opacity="0.55">
    <rect x="130" y="170" width="60" height="60"/>
    <rect x="290" y="170" width="60" height="60"/>
    <rect x="370" y="170" width="60" height="60"/>
    <rect x="210" y="250" width="60" height="60"/>
    <rect x="450" y="250" width="60" height="60"/>
    <rect x="130" y="330" width="60" height="60"/>
    <rect x="290" y="330" width="60" height="60"/>
    <rect x="450" y="330" width="60" height="60"/>
    <rect x="210" y="410" width="60" height="60"/>
    <rect x="370" y="410" width="60" height="60"/>
    <rect x="130" y="490" width="60" height="60"/>
    <rect x="290" y="490" width="60" height="60"/>
    <rect x="450" y="490" width="60" height="60"/>
    <rect x="210" y="570" width="60" height="60"/>
    <rect x="370" y="570" width="60" height="60"/>
  </g>

  <!-- Accent top -->
  <rect x="120" y="80" width="400" height="8" fill="#c8a96a" opacity="0.7"/>
</svg>
