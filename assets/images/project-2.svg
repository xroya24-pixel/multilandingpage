<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" preserveAspectRatio="xMidYMid slice">
  <!-- The Garden Villa — Hunian modern minimalis -->
  <defs>
    <linearGradient id="p2-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c5d4e3"/>
      <stop offset="1" stop-color="#eaf0f5"/>
    </linearGradient>
    <linearGradient id="p2-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8f8f8"/>
      <stop offset="1" stop-color="#d8dde3"/>
    </linearGradient>
    <linearGradient id="p2-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <rect width="600" height="450" fill="url(#p2-sky)"/>

  <!-- Distant hills -->
  <path d="M0 320 Q150 280 300 310 T600 300 V450 H0 Z" fill="#94a3b8" opacity="0.3"/>

  <!-- Garden ground -->
  <rect x="0" y="360" width="600" height="90" fill="#7a8c6a" opacity="0.5"/>

  <!-- House main body -->
  <rect x="120" y="170" width="360" height="200" fill="url(#p2-wall)"/>

  <!-- Flat roof accent -->
  <rect x="110" y="160" width="380" height="20" fill="#1e293b"/>

  <!-- Second floor cantilever -->
  <rect x="340" y="170" width="160" height="110" fill="url(#p2-glass)"/>

  <!-- Ground floor glass wall -->
  <rect x="140" y="240" width="180" height="130" fill="url(#p2-glass)" opacity="0.85"/>
  <g stroke="#475569" stroke-width="2" fill="none">
    <line x1="200" y1="240" x2="200" y2="370"/>
    <line x1="260" y1="240" x2="260" y2="370"/>
    <line x1="140" y1="305" x2="320" y2="305"/>
  </g>

  <!-- Warm interior light -->
  <rect x="150" y="250" width="160" height="110" fill="#c8a96a" opacity="0.25"/>

  <!-- Second floor windows -->
  <g fill="#c8a96a" opacity="0.4">
    <rect x="360" y="185" width="40" height="35"/>
    <rect x="420" y="185" width="40" height="35"/>
    <rect x="470" y="185" width="25" height="35"/>
  </g>

  <!-- Wooden gate / door -->
  <rect x="360" y="295" width="60" height="75" fill="#6b4f35" opacity="0.8"/>

  <!-- Plants / trees -->
  <circle cx="60" cy="340" r="35" fill="#5a7050"/>
  <circle cx="85" cy="330" r="28" fill="#6b8260"/>
  <circle cx="540" cy="340" r="40" fill="#5a7050"/>
  <circle cx="510" cy="335" r="26" fill="#6b8260"/>

  <!-- Path stones -->
  <g fill="#cbd5e1">
    <ellipse cx="380" cy="395" rx="20" ry="6"/>
    <ellipse cx="430" cy="410" rx="22" ry="6"/>
    <ellipse cx="480" cy="425" rx="20" ry="6"/>
  </g>
</svg>
